<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Blocked - FocusBill</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #2484BF 0%, #052940 100%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 600px;
    }

    .icon {
      font-size: 80px;
      margin-bottom: 20px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
    }

    p {
      font-size: 20px;
      margin-bottom: 30px;
      opacity: 0.95;
      line-height: 1.6;
    }

    .message {
      background: rgba(255, 255, 255, 0.2);
      padding: 30px;
      border-radius: 15px;
      margin-bottom: 30px;
      backdrop-filter: blur(10px);
    }

    .quote {
      font-style: italic;
      font-size: 18px;
      margin-top: 20px;
      opacity: 0.9;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 40px;
      flex-wrap: wrap;
    }

    .stat {
      background: rgba(255, 255, 255, 0.15);
      padding: 20px;
      border-radius: 10px;
      min-width: 120px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .stat-label {
      font-size: 14px;
      opacity: 0.8;
    }

    .button {
      display: inline-block;
      padding: 15px 30px;
      background: white;
      color: #052940;
      text-decoration: none;
      border-radius: 50px;
      font-weight: bold;
      font-size: 16px;
      transition: all 0.3s;
      margin-top: 20px;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon"><img class="icon-white" src="icons/logo_white.png" alt="Timer Icon" style="width: 128px; height:auto"></div>
    <h1>Stay Focused!</h1>
    
    <div class="message">
      <p>This site is blocked during your focus session.</p>
      <p>You're doing great work! Keep your momentum going.</p>
      <p class="quote">"The secret of getting ahead is getting started."<br>- Mark Twain</p>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="sessions-today">0</div>
        <div class="stat-label">Sessions Today</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="time-today">0h</div>
        <div class="stat-label">Time Today</div>
      </div>
    </div>

    <a href="#" class="button" onclick="goBack()">← Go Back</a>
  </div>

  <script>
    // Load today's stats
    chrome.storage.local.get(['appData'], (result) => {
      if (result.appData && result.appData.timeLogs) {
        const today = new Date().toDateString();
        const todayLogs = result.appData.timeLogs.filter(log => 
          new Date(log.date).toDateString() === today
        );

        const totalMinutes = todayLogs.reduce((sum, log) => sum + log.duration, 0);
        const hours = Math.floor(totalMinutes / 60);

        document.getElementById('sessions-today').textContent = todayLogs.length;
        document.getElementById('time-today').textContent = `${hours}h`;
      }
    });

    function goBack() {
      window.history.back();
    }
  </script>
</body>
</html>
