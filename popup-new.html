<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusBill</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="popup-new.css">
</head>
<body>
  <div class="popup-container">

    <!-- Header -->
    <header class="popup-header">
      <div class="header-content">
        <h1 class="app-title">
          <span class="app-icon">
            <img src="icons/FOCUSBILL_BLACK.png" alt="FocusBill" style="width: 130px; height: auto;" />
          </span>
        </h1>
        <div class="header-right">
          <div class="session-status" id="session-status-badge">
            <span class="status-dot"></span>
            <span class="status-text">Ready</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Timer Section -->
    <section class="timer-section">

      <!-- Timer Ring -->
      <div class="timer-container">
        <svg class="timer-ring" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="timerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#001A6E"/>
              <stop offset="100%" stop-color="#2B59E0"/>
            </linearGradient>
            <linearGradient id="timerGradientRunning" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#2B59E0"/>
              <stop offset="100%" stop-color="#17F8AD"/>
            </linearGradient>
          </defs>
          <circle class="ring-bg" cx="90" cy="90" r="80" />
          <circle class="ring-progress" id="timer-ring-progress" cx="90" cy="90" r="80" />
        </svg>
        <div class="timer-center">
          <div class="timer-value" id="timer-value">25:00</div>
          <div class="timer-label" id="timer-label">Focus Time</div>
        </div>
      </div>

      <!-- Session Info -->
      <div class="session-info">
        <div class="info-field">
          <label class="field-label" for="client-select">Client</label>
          <div class="select-row">
            <select class="field-select" id="client-select">
              <option value="">Select client...</option>
            </select>
            <button class="btn-add-inline" id="add-client-quick" title="Add new client">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="info-field">
          <label class="field-label" for="task-input">Task Description</label>
          <input
            type="text"
            class="field-input"
            id="task-input"
            placeholder="What are you working on?"
          >
        </div>
      </div>

      <!-- Timer Controls -->
      <div class="timer-controls">
        <button class="btn btn-primary btn-lg" id="start-btn">
          <span class="btn-icon">
            <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
              <path d="M8 5v14l11-7z"/>
            </svg>
          </span>
          Start Focus
        </button>

        <button class="btn btn-secondary btn-lg hidden" id="pause-btn">
          <span class="btn-icon">
            <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
          </span>
          Pause
        </button>

        <button class="btn btn-danger btn-lg hidden" id="stop-btn">
          <span class="btn-icon">
            <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
              <path d="M6 6h12v12H6z"/>
            </svg>
          </span>
          Stop
        </button>
      </div>

      <!-- Quick Actions -->
      <div class="quick-actions">
        <button class="quick-action-btn" id="toggle-blocker">
          <span class="action-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <circle cx="12" cy="12" r="10"/>
              <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
            </svg>
          </span>
          <span class="action-label">Block Sites</span>
          <span class="action-toggle active" id="blocker-toggle-dot"></span>
        </button>

        <button class="quick-action-btn" id="quick-note">
          <span class="action-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
          </span>
          <span class="action-label">Quick Note</span>
        </button>
      </div>
    </section>

    <!-- Today's Summary -->
    <section class="summary-section">
      <h3 class="section-title">Today's Activity</h3>
      <div class="summary-grid">
        <div class="summary-item">
          <div class="summary-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
          </div>
          <div class="summary-content">
            <div class="summary-value" id="today-hours">0h</div>
            <div class="summary-label">Tracked</div>
          </div>
        </div>
        <div class="summary-item">
          <div class="summary-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 8v4l4 2"/>
            </svg>
          </div>
          <div class="summary-content">
            <div class="summary-value" id="today-sessions">0</div>
            <div class="summary-label">Sessions</div>
          </div>
        </div>
        <div class="summary-item">
          <div class="summary-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <line x1="12" y1="1" x2="12" y2="23"/>
              <path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
            </svg>
          </div>
          <div class="summary-content">
            <div class="summary-value" id="today-revenue">$0</div>
            <div class="summary-label">Earned</div>
          </div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="popup-footer">
      <button class="btn btn-ghost btn-full" id="open-dashboard">
        <span class="btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
        </span>
        Open Full Dashboard
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" class="chevron-icon">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
      </button>
    </footer>

  </div>

  <!-- Quick Note Modal -->
  <div class="modal hidden" id="note-modal">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Quick Note</h3>
        <button class="modal-close" id="close-note-modal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <textarea
          class="note-textarea"
          id="note-textarea"
          placeholder="Jot down your thoughts..."
          rows="5"
        ></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancel-note">Cancel</button>
        <button class="btn btn-primary" id="save-note">Save Note</button>
      </div>
    </div>
  </div>

  <!-- Add Client Modal -->
  <div class="modal hidden" id="client-modal">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Add Client</h3>
        <button class="modal-close" id="close-client-modal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="field-label" for="client-name-input">Client Name</label>
          <input
            type="text"
            class="field-input"
            id="client-name-input"
            placeholder="e.g., Acme Corp"
          >
        </div>
        <div class="form-group">
          <label class="field-label" for="client-rate-input">Hourly Rate ($)</label>
          <input
            type="number"
            class="field-input"
            id="client-rate-input"
            placeholder="75"
            min="0"
            step="0.01"
          >
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancel-client">Cancel</button>
        <button class="btn btn-primary" id="save-client">Save Client</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="theme.js"></script>
  <script src="popup-new.js"></script>
</body>
</html>
